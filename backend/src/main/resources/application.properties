spring.application.name=CafeManagement

# Database configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/cafeflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl-auto (update creates/updates the schema automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server configuration
server.port=8080

# JWT Configuration (for future Auth implementation)
jwt.secret=cafeflow_super_secret_key_which_should_be_long_enough_for_hmac_sha256
jwt.expiration=3600000
